name: use action Workflow
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: list file
        run: ls -la
    
      - name: setup node
        uses: actions/setup-node@v4

      - name: checking node version 
        run: npm -v

      - name: installing dependency 
        run: npm i
