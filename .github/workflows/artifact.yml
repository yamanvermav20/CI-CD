name: artifacts
on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps: 
      - name: create a file
        run: echo "Hello World" > file.txt
      - name: upload an artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: my-file
          path: file.txt
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: download an artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file
      - name: Read the file
        run: cat file.txt
